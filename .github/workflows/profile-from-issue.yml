name: Create profile from issue

on:
  issues:
    types: [labeled]

jobs:
  create-profile:
    if: contains(github.event.label.name, 'drive-profile')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and extract profile
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;

            const codeBlock = body.match(/```\n([\s\S]*?)```/);
            if (!codeBlock) {
              core.setFailed('No code block found in issue body');
              return;
            }

            const lines = codeBlock[1].trim().split('\n');
            const fields = {};
            for (const line of lines) {
              const match = line.match(/^(\w[\w\s]*?):\s+(.+)$/);
              if (match) {
                fields[match[1].trim().toLowerCase().replace(/\s+/g, '_')] = match[2].trim();
              }
            }

            if (!fields.manufacturer || !fields.product) {
              core.setFailed('Missing manufacturer or product');
              return;
            }

            const dirName = `${fields.manufacturer}-${fields.product}`
              .toLowerCase()
              .replace(/[^a-z0-9-]/g, '-')
              .replace(/-+/g, '-')
              .replace(/^-|-$/g, '');

            const b64Match = body.match(/Profile data \(base64 zip\)<\/summary>\s*\n\s*```\n([\s\S]*?)```/);
            let hasZip = false;
            if (b64Match) {
              const b64 = b64Match[1].replace(/\s/g, '');
              const fs = require('fs');
              fs.writeFileSync('/tmp/profile.zip', Buffer.from(b64, 'base64'));
              hasZip = true;
              console.log('Extracted zip: ' + Buffer.from(b64, 'base64').length + ' bytes');
            }

            core.setOutput('dir_name', dirName);
            core.setOutput('manufacturer', fields.manufacturer || '');
            core.setOutput('product', fields.product || '');
            core.setOutput('revision', fields.revision || '');
            core.setOutput('platform', fields.platform || '');
            core.setOutput('firmware', fields.firmware || '');
            core.setOutput('has_zip', hasZip ? 'true' : 'false');

      - name: Create profile from zip
        if: steps.parse.outputs.has_zip == 'true'
        run: |
          DIR="profiles/${{ steps.parse.outputs.dir_name }}"
          mkdir -p "$DIR"
          cd "$DIR"
          unzip -o /tmp/profile.zip
          echo "Profile extracted:"
          ls -la

      - name: Create profile stub
        if: steps.parse.outputs.has_zip != 'true'
        run: |
          DIR="profiles/${{ steps.parse.outputs.dir_name }}"
          mkdir -p "$DIR"
          echo "# Stub profile from issue #${{ github.event.issue.number }}" > "$DIR/drive.toml"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add profile: ${{ steps.parse.outputs.manufacturer }} ${{ steps.parse.outputs.product }}"
          title: "New profile: ${{ steps.parse.outputs.manufacturer }} ${{ steps.parse.outputs.product }}"
          body: |
            From issue #${{ github.event.issue.number }}.

            **Drive:** ${{ steps.parse.outputs.manufacturer }} ${{ steps.parse.outputs.product }}
            **Platform:** ${{ steps.parse.outputs.platform }}
            **Data:** ${{ steps.parse.outputs.has_zip == 'true' && 'Full profile (.bin files)' || 'Stub (text only)' }}

            Closes #${{ github.event.issue.number }}
          branch: "profile/${{ steps.parse.outputs.dir_name }}"
          labels: drive-profile

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const hasZip = '${{ steps.parse.outputs.has_zip }}' === 'true';
            const type = hasZip ? 'full profile with .bin files' : 'stub profile';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Thanks! PR created with ${type}.\n\n**${{ steps.parse.outputs.manufacturer }} ${{ steps.parse.outputs.product }}** — ${{ steps.parse.outputs.platform }}`
            });
