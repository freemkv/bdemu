name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VER="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          if [ "$CARGO_VER" != "${{ github.ref_name }}" ]; then
            echo "::error::Cargo.toml says $CARGO_VER but tag is ${{ github.ref_name }}"
            exit 1
          fi
          echo "Version match: $CARGO_VER"

  build:
    needs: verify
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          DIR="bdemu-${{ github.ref_name }}"
          mkdir -p "$DIR/profiles"
          cp target/release/bdemu "$DIR/"
          cp target/release/libbdemu.so "$DIR/" 2>/dev/null || true
          cp -r profiles/* "$DIR/profiles/" 2>/dev/null || true
          # Versioned archive
          tar czf "${DIR}-x86_64-linux.tar.gz" "$DIR"
          # Stable-name archive (for /latest/ URLs)
          tar czf "bdemu-x86_64-linux.tar.gz" "$DIR"

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tar.gz'

  update-readme:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - name: Update version in README
        run: |
          VERSION="${{ github.ref_name }}"
          DATE="$(date -u '+%Y-%m-%d')"
          sed -i "s|^\*\*Latest: v[0-9]*\.[0-9]*\.[0-9]*.*(.*)\*\*|**Latest: ${VERSION} (${DATE})**|" README.md
          sed -i "s|^\*\*Latest: v[0-9]*\.[0-9]*\.[0-9]*\*\*|**Latest: ${VERSION} (${DATE})**|" README.md
          sed -i "s|bdemu-v[0-9]*\.[0-9]*\.[0-9]*|bdemu-${VERSION}|g" README.md
          sed -i "s|/download/v[0-9]*\.[0-9]*\.[0-9]*/|/download/${VERSION}/|g" README.md
          sed -i "s|bdemu [0-9]*\.[0-9]*\.[0-9]*|bdemu ${VERSION#v}|g" README.md
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update to bdemu ${{ github.ref_name }}"
          git push
