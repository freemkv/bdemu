name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VER="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          if [ "$CARGO_VER" != "${{ github.ref_name }}" ]; then
            echo "::error::Cargo.toml says $CARGO_VER but tag is ${{ github.ref_name }}"
            exit 1
          fi
          echo "Version match: $CARGO_VER"

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release

      - name: Package
        run: |
          DIR="bdemu-${{ github.ref_name }}"
          mkdir -p "$DIR/profiles"
          cp target/release/bdemu "$DIR/"
          cp target/release/libbdemu.so "$DIR/"
          cp -r profiles/* "$DIR/profiles/" 2>/dev/null || true
          cat > "$DIR/example.sh" << 'SCRIPT'
          #!/bin/bash
          # Example: emulate a BU40N drive and run freemkv against it
          #
          # 1. Download freemkv: https://github.com/freemkv/freemkv/releases/latest
          # 2. Run:
          #      BDEMU_PROFILE=profiles/hl-dt-st-bd-re-bu40n-1.03-nm00000 \
          #        LD_PRELOAD=./libbdemu.so \
          #        ./freemkv info

          PROFILE="${1:-profiles/hl-dt-st-bd-re-bu40n-1.03-nm00000}"

          echo "Emulating drive from: $PROFILE"
          echo "Run your app with:"
          echo ""
          echo "  BDEMU_PROFILE=$PROFILE LD_PRELOAD=./libbdemu.so <your-app>"
          echo ""
          echo "Example with freemkv:"
          echo ""
          echo "  BDEMU_PROFILE=$PROFILE LD_PRELOAD=./libbdemu.so ./freemkv info"
          SCRIPT
          chmod +x "$DIR/example.sh"
          tar czf "${DIR}-x86_64-linux.tar.gz" "$DIR"

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tar.gz'
